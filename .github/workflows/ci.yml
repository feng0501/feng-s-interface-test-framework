name: CI - 接口自动化测试

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          pip install -r requirements.txt

      - name: 启动 Mock 服务器（后台运行）
        run: |
          nohup python mock_server.py > mock_server.log 2>&1 &
          sleep 5
          cat mock_server.log  # 打印日志，方便调试
          curl --retry 5 --retry-delay 1 --retry-connrefused http://127.0.0.1:5000/pet/1 || true

      - name: 等待 Mock 服务器就绪
        run: |
          for i in {1..10}; do
            if curl -s http://127.0.0.1:5000/pet/1 > /dev/null; then
              echo "Mock server is ready"
              exit 0
            fi
            echo "Waiting for mock server... (attempt $i/10)"
            sleep 2
          done
          echo "Mock server failed to start"
          cat mock_server.log
          exit 1

      - name: 运行测试并生成 Allure 原始数据
        run: |
          pytest testcases/ --alluredir=./reports/allure_raw

      - name: 上传 Allure 原始数据作为 Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: ./reports/allure_raw
          retention-days: 30