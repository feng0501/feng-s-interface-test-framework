name: CI - 接口自动化测试

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          pip install -r requirements.txt

      - name: 启动 Mock 服务器（后台运行）
        run: |
          python mock_server.py &
          sleep 3  # 等待服务器启动

      - name: 运行测试并生成 Allure 原始数据
        run: |
          pytest testcases/ --alluredir=./reports/allure_raw

      - name: 上传 Allure 原始数据作为 Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: ./reports/allure_raw
          retention-days: 30